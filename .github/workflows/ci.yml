name: CI

# 阶段 3 Task 3.2 + 阶段 4 Task 4.1 · 最小 CI 自动化保险(EXECUTION_PLAN P1-02 / P1-03)
# 防"v0.20 db pool 5 重演" · 每次 push / PR 必须三关都过:
#   1) import 静态检查
#   2) home.js i18n 4 语完整性(zh/en/th/ja key 集合一致)
#   3) unit tests 全绿
# 不依赖生产 secret / 不联网调外部业务(整 contract tests 全部 stub)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

# 同一 ref 上有新 push 时取消旧 run · 省 CI 配额
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: import-check + i18n + unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Static import check
        run: python scripts/check_imports.py --quiet

      - name: i18n completeness check (home.js · zh/en/th/ja)
        run: python scripts/check_i18n.py --strict --quiet

      - name: Run unit tests
        run: python -m unittest discover -s tests/unit -p "test_*.py" -v
