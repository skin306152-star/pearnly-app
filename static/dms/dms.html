<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pearnly DMS</title>
    <link rel="icon" href="/static/landing/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/pearnly-ui.css?v=1" />
    <link rel="stylesheet" href="/static/dist/dms.css?v=11" />
  </head>
  <body>
    <!-- 登录卡 / 邀请制提示门面(dms-gate.js 挂载,与工作台互斥显示) -->
    <div id="gateRoot"></div>

    <!-- 工作台外壳(鉴权+闸通过后由 dms-boot.js 摘 display:none) -->
    <div class="dms-shell" id="dmsShell" style="display: none">
      <header class="dms-topbar">
        <div class="dms-brand" id="dmsBrand">
          <span class="dms-brand-mono">P</span>
          <span class="dms-brand-word"><b>Pearnly</b> <em>DMS</em></span>
        </div>
        <div class="dms-topbar-right">
          <div class="dms-langbar" role="tablist" aria-label="Language">
            <button type="button" class="dms-lang-btn" data-dms-lang="zh">中文</button>
            <button type="button" class="dms-lang-btn" data-dms-lang="th">ไทย</button>
            <button type="button" class="dms-lang-btn" data-dms-lang="en">EN</button>
            <button type="button" class="dms-lang-btn" data-dms-lang="ja">日本語</button>
          </div>
          <button type="button" class="btn" id="dmsLogout" data-dt="dms-topbar-logout"></button>
        </div>
      </header>

      <div class="dms-body">
        <nav class="dms-nav" aria-label="DMS">
          <button
            type="button"
            class="dms-nav-item"
            data-view="intake"
            data-dt="dms-nav-intake"
          ></button>
          <button
            type="button"
            class="dms-nav-item"
            data-view="records"
            data-dt="dms-nav-records"
          ></button>
          <button
            type="button"
            class="dms-nav-item"
            data-view="roster"
            data-dt="dms-nav-roster"
          ></button>
          <button
            type="button"
            class="dms-nav-item"
            data-view="billing"
            data-dt="dms-nav-billing"
          ></button>
        </nav>

        <main class="dms-main">
          <section class="dms-view" id="dms-view-intake">
            <div id="page-dms-intake"></div>
          </section>
          <section class="dms-view" id="dms-view-records"></section>
          <section class="dms-view" id="dms-view-roster"></section>
          <section class="dms-view" id="dms-view-billing"></section>
        </main>
      </div>
    </div>

    <!-- 4 语词典分片(纯数据 · 独立 <script> 先加载)+ 装配层,同 /ai 先例不并入 bundle -->
    <script src="/static/dms/dms-i18n-zh.js?v=10"></script>
    <script src="/static/dms/dms-i18n-th.js?v=10"></script>
    <script src="/static/dms/dms-i18n-en.js?v=10"></script>
    <script src="/static/dms/dms-i18n-ja.js?v=10"></script>
    <script src="/static/dms/dms-i18n.js?v=2"></script>
    <script src="/static/dist/dms.js?v=13" defer></script>
  </body>
</html>
