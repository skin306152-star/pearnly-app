<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>预览 · 发票风险检查面板</title>
    <style>
      /* 真实 Pearnly 设计 token(取自 home-01-base.css · 极简黑白风) */
      :root {
        --brand: #111111;
        --accent: #111111;
        --bg: #f4f4f0;
        --card: #ffffff;
        --line: #e8e8e3;
        --line-soft: #f0f0eb;
        --ink: #111111;
        --ink-2: #555555;
        --ink-3: #999999;
        --success: #16a34a;
        --success-bg: #dcfce7;
        --warn: #d97706;
        --warn-bg: #fef3c7;
        --danger: #dc2626;
        --danger-bg: #fee2e2;
        --shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
        --shadow-lg: 0 10px 32px rgba(0, 0, 0, 0.08);
        --font-mono: "SF Mono", "Monaco", Consolas, "Courier New", monospace;
        --topbar-h: 48px;
        --sidebar-w: 64px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans Thai", Roboto,
          "PingFang SC", "Microsoft YaHei", sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      /* 预览说明条(不是产品的一部分) */
      .note {
        background: #111;
        color: #fff;
        padding: 10px 18px;
        font-size: 13px;
        line-height: 1.6;
      }
      .note b {
        color: #ffd966;
      }
      .switcher {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        padding: 12px 18px;
        background: #fff;
        border-bottom: 1px solid var(--line);
        align-items: center;
      }
      .switcher span {
        font-size: 13px;
        color: var(--ink-2);
        margin-right: 4px;
      }
      .switcher button {
        font: inherit;
        font-size: 13px;
        padding: 6px 14px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink-2);
        border-radius: 8px;
        cursor: pointer;
      }
      .switcher button.on {
        background: var(--ink);
        color: #fff;
        border-color: var(--ink);
      }

      /* 模拟应用外壳(让你看清"它长在哪") */
      .app {
        display: flex;
        min-height: 520px;
      }
      .sidebar {
        width: var(--sidebar-w);
        background: #fff;
        border-right: 1px solid var(--line);
        padding: 14px 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
      }
      .sidebar .logo {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        background: var(--ink);
        color: #fff;
        display: grid;
        place-items: center;
        font-weight: 700;
      }
      .sidebar .ico {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: var(--ink-3);
        font-size: 17px;
      }
      .sidebar .ico.active {
        background: var(--accent-soft, #f4f4f0);
        color: var(--ink);
      }
      .main {
        flex: 1;
        min-width: 0;
      }
      .topbar {
        height: var(--topbar-h);
        border-bottom: 1px solid var(--line);
        background: #fff;
        display: flex;
        align-items: center;
        padding: 0 20px;
        gap: 16px;
      }
      .ws {
        font-size: 13px;
        color: var(--ink-2);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 6px 12px;
        background: #fff;
      }
      .ws b {
        color: var(--ink);
      }
      .content {
        padding: 24px;
      }
      .page-title {
        font-size: 18px;
        font-weight: 650;
        margin: 0 0 18px;
      }

      /* 结果区:左字段卡 + 右风险面板 */
      .result {
        display: grid;
        grid-template-columns: minmax(280px, 360px) 1fr;
        gap: 18px;
        align-items: start;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        box-shadow: var(--shadow);
      }
      .fields {
        padding: 18px 20px;
      }
      .fields h3,
      .panel h3 {
        margin: 0 0 14px;
        font-size: 14px;
        font-weight: 600;
        color: var(--ink-2);
      }
      .frow {
        display: flex;
        justify-content: space-between;
        padding: 9px 0;
        border-bottom: 1px solid var(--line-soft);
        font-size: 14px;
      }
      .frow:last-child {
        border-bottom: none;
      }
      .frow .k {
        color: var(--ink-3);
      }
      .frow .v {
        font-weight: 550;
      }
      .frow .v.num {
        font-family: var(--font-mono);
      }

      /* 风险面板 */
      .panel {
        padding: 18px 20px;
      }
      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }
      .panel-head h3 {
        margin: 0;
      }
      .badge {
        font-size: 13px;
        font-weight: 600;
        padding: 5px 12px;
        border-radius: 999px;
        display: inline-flex;
        gap: 6px;
        align-items: center;
      }
      .badge.high {
        background: var(--danger-bg);
        color: var(--danger);
      }
      .badge.mid {
        background: var(--warn-bg);
        color: var(--warn);
      }
      .badge.ok {
        background: var(--success-bg);
        color: var(--success);
      }

      .finding {
        border: 1px solid var(--line);
        border-left-width: 4px;
        border-radius: 10px;
        padding: 12px 14px;
        margin-bottom: 12px;
      }
      .finding.high {
        border-left-color: var(--danger);
      }
      .finding.mid {
        border-left-color: var(--warn);
      }
      .finding .ftop {
        display: flex;
        gap: 8px;
        align-items: baseline;
        font-size: 14px;
        font-weight: 600;
      }
      .finding .sev {
        font-size: 13px;
        font-weight: 700;
      }
      .finding.high .sev {
        color: var(--danger);
      }
      .finding.mid .sev {
        color: var(--warn);
      }
      .finding .why {
        font-size: 13px;
        color: var(--ink-2);
        margin: 6px 0 4px;
        line-height: 1.55;
      }
      .finding .why .num {
        font-family: var(--font-mono);
      }
      .finding .src {
        font-size: 12px;
        color: var(--ink-3);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .finding .src a {
        color: var(--ink-2);
        text-decoration: none;
        border-bottom: 1px dashed var(--ink-3);
        cursor: pointer;
      }
      .finding .acts {
        display: flex;
        gap: 8px;
        margin-top: 11px;
      }
      .btn {
        font: inherit;
        font-size: 13px;
        padding: 6px 14px;
        border-radius: 8px;
        cursor: pointer;
        border: 1px solid var(--line);
      }
      .btn-primary {
        background: var(--ink);
        color: #fff;
        border-color: var(--ink);
      }
      .btn-secondary {
        background: #fff;
        color: var(--ink-2);
      }

      /* 无异常折叠态 */
      .clean {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 16px;
        font-size: 14px;
        color: var(--success);
        font-weight: 550;
      }
      /* 加载骨架 */
      .skel {
        height: 14px;
        border-radius: 6px;
        background: linear-gradient(90deg, #eee, #f6f6f3, #eee);
        background-size: 200% 100%;
        animation: sh 1.2s infinite;
        margin-bottom: 12px;
      }
      @keyframes sh {
        to {
          background-position: -200% 0;
        }
      }
      .errbox {
        padding: 16px;
        font-size: 14px;
        color: var(--ink-2);
      }
      .errbox .btn {
        margin-top: 10px;
      }

      @media (max-width: 720px) {
        .result {
          grid-template-columns: 1fr;
        }
        .sidebar {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="note">
      这是 <b>设计预览</b>(不是真功能)。下方"切换状态"可看面板的 4 种情况。样式取自
      Pearnly 真实设计 token,文案为示例。真实产品支持泰/英/中/日四语。
    </div>

    <div class="switcher">
      <span>切换状态:</span>
      <button data-state="risk" class="on">有风险(3条)</button>
      <button data-state="clean">无异常(折叠)</button>
      <button data-state="loading">检查中</button>
      <button data-state="error">检查失败</button>
    </div>

    <div class="app">
      <aside class="sidebar">
        <div class="logo">P</div>
        <div class="ico">📄</div>
        <div class="ico active">🧾</div>
        <div class="ico">📚</div>
        <div class="ico">⚙️</div>
      </aside>
      <div class="main">
        <div class="topbar">
          <div class="ws">账套主体:<b>ABC 贸易有限公司</b> ▾</div>
        </div>
        <div class="content">
          <h2 class="page-title">发票识别结果</h2>
          <div class="result">
            <!-- 左:发票字段(认出来的) -->
            <div class="card fields">
              <h3>识别字段</h3>
              <div class="frow"><span class="k">卖方</span><span class="v">ABC 贸易有限公司</span></div>
              <div class="frow"><span class="k">税号</span><span class="v num">0105558012345</span></div>
              <div class="frow"><span class="k">发票号</span><span class="v num">INV-2024-0891</span></div>
              <div class="frow"><span class="k">发票日期</span><span class="v num">2024-03-15</span></div>
              <div class="frow"><span class="k">金额(小计)</span><span class="v num">35,000.00</span></div>
              <div class="frow"><span class="k">VAT (7%)</span><span class="v num">80.00</span></div>
              <div class="frow"><span class="k">合计</span><span class="v num">35,080.00</span></div>
            </div>
            <!-- 右:风险检查面板(JS 按状态渲染) -->
            <div class="card" id="panel"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const panel = document.getElementById("panel");

      const findings = [
        {
          sev: "mid",
          sevLabel: "中",
          title: "VAT 对不上",
          why: '7% VAT 应为 <span class="num">2,450.00</span>,票面写 <span class="num">80.00</span>。',
          rule: "命中规则 R-VAT-01(VAT 算术校验)",
        },
        {
          sev: "high",
          sevLabel: "高",
          title: "这家供应商需人工复核",
          why: "客户为本供应商设置了「大额必审」。",
          rule: "命中规则 R-SUP-02(强制人工复核名单)",
        },
        {
          sev: "mid",
          sevLabel: "中",
          title: "超出合同金额上限",
          why: '服务类单票上限 <span class="num">30,000</span>,本票 <span class="num">35,000</span>。',
          source: { doc: "服务合同2024.pdf", page: "第3页" },
        },
      ];

      function findingHtml(f) {
        const src = f.source
          ? `<div class="src">📄 <a>${f.source.doc} ${f.source.page} ›</a></div>`
          : `<div class="src">${f.rule}</div>`;
        return `
          <div class="finding ${f.sev}">
            <div class="ftop"><span class="sev">${f.sev === "high" ? "🔴 高" : "🟡 中"}</span><span>${f.title}</span></div>
            <div class="why">${f.why}</div>
            ${src}
            <div class="acts">
              <button class="btn btn-primary">✓ 采纳</button>
              <button class="btn btn-secondary">✕ 忽略</button>
            </div>
          </div>`;
      }

      const views = {
        risk: () => `
          <div class="panel">
            <div class="panel-head">
              <h3>风险检查</h3>
              <span class="badge high">🔴 风险:高</span>
            </div>
            ${findings.map(findingHtml).join("")}
          </div>`,
        clean: () => `
          <div class="clean">✓ 无异常 — 字段完整、VAT 正确、未触发任何客户规则</div>`,
        loading: () => `
          <div class="panel">
            <div class="panel-head"><h3>风险检查</h3><span class="badge mid">检查中…</span></div>
            <div class="skel" style="width:90%"></div>
            <div class="skel" style="width:75%"></div>
            <div class="skel" style="width:82%"></div>
          </div>`,
        error: () => `
          <div class="errbox">
            <div>检查未完成 — 暂时连不上检查服务。</div>
            <button class="btn btn-secondary">重试</button>
          </div>`,
      };

      function render(state) {
        panel.innerHTML = views[state]();
        document.querySelectorAll(".switcher button").forEach((b) => {
          b.classList.toggle("on", b.dataset.state === state);
        });
      }

      document.querySelectorAll(".switcher button").forEach((b) => {
        b.addEventListener("click", () => render(b.dataset.state));
      });

      render("risk");
    </script>
  </body>
</html>
