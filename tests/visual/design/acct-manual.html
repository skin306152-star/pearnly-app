<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pearnly · 手工凭证(设计稿快照 · home-01 令牌)</title>
    <style>
      :root {
        --accent: #7c4dff;
        --accent-ink: #fff;
        --accent-deep: #6b3ff2;
        --card: #ffffff;
        --bg: #f7f5fc;
        --ink: #231942;
        --ink2: #5b5875;
        --ink3: #8f8aa8;
        --line: #ece8f6;
        --line2: #f4f2fa;
        --sh: 0 1px 2px rgba(11, 26, 43, 0.06);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
      }
      body {
        background: var(--bg);
        color: var(--ink);
        font-size: 13.5px;
        padding: 24px 26px;
      }
      .mjx .ph {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 14px;
        flex-wrap: wrap;
      }
      .mjx .ph .t {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.2px;
      }
      .mjx .ph .sub {
        color: var(--ink2);
        font-size: 12.5px;
        margin-top: 4px;
      }
      .mjx .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: var(--sh);
        overflow: hidden;
      }
      .mjx .btn {
        height: 32px;
        padding: 0 13px;
        border: 1px solid var(--line);
        border-radius: 9px;
        background: var(--card);
        font-size: 12.5px;
        cursor: pointer;
        color: var(--ink);
      }
      .mjx .btn.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--accent-ink);
        font-weight: 650;
      }
    </style>
  </head>
  <body>
    <div class="mjx">
      <div class="ph">
        <div>
          <div class="t">手工凭证</div>
          <div class="sub">录入计提、摊销、调整等系统未自动生成的分录</div>
        </div>
      </div>
      <div class="panel">
        <div style="padding: 16px">
          <button class="btn primary">过账</button>
        </div>
      </div>
    </div>
  </body>
</html>
