      height: 14px;
      border: 2px solid #94A3B8;

    .layer-body {

    .rail-stack .layer-body {

    .groups {

      gap: 16px;

    .group {

      background: linear-gradient(180deg, color-mix(in srgb, var(--group-color) 7%, #fff), #fff 58%);

    .rail-stack .group {

    .group-title {

      gap: 9px;

      color: color-mix(in srgb, var(--group-color) 75%, #111827);

      background: var(--card);

    .flow-arrow {

      .print-details {
        display: block;
        margin: 8px 0 0;
        padding-left: 18px;
        color: #334155;
        font-size: 11px;
      }

      const registry = new Map();

      let activeId = null;

      function hasHan(value) {
        return /[\u3400-\u9FFF]/.test(String(value || ""));
      }

      function normalize(value) {
        return String(value || "").toLowerCase().replace(/\s+/g, "");
      }

      function compactAscii(value) {
        return String(value || "")
          .replace(/[\u3400-\u9FFF\u3000-\u303F，。；、（）]/g, " ")
          .replace(/[·]/g, " ")
          .replace(/\s+/g, " ")
          .trim();
      }

      function translateText(value, moduleName, index) {
        const text = String(value || "");
        if (!hasHan(text)) return text;
        const parts = [];
        THAI_TERM_RULES.forEach(([key, label]) => {
          if (text.includes(key) && !parts.includes(label)) parts.push(label);
        });
        const ascii = compactAscii(text);
        if (parts.length && ascii) return `${parts.join(" / ")} · ${ascii}`;
        if (parts.length) return parts.join(" / ");
        return `${moduleName} · รายการ ${index + 1}`;
      }

      function localizeDetail(item, moduleName, index) {
        if (typeof item === "string") return translateText(item, moduleName, index);
        return {
          label: translateText(item.label, moduleName, index),
          value: translateText(item.value, moduleName, index),
          note: translateText(item.note, moduleName, index)
        };
      }

      function buildThaiArch(source) {
        return {
          ...source,
          title: THAI_COPY.title,
          subtitle: THAI_COPY.subtitle,
          searchPlaceholder: THAI_COPY.searchPlaceholder,
          flowLabel: THAI_COPY.flowLabel,
          layers: source.layers.map((layer, layerIndex) => {
            const layerText = THAI_COPY.layers[layer.id] || {};
            return {
              ...layer,
              title: layerText.title || `ชั้นที่ ${layerIndex + 1}`,
              en: layerText.en || layer.en,
              groups: layer.groups.map((group) => {
                const groupTitle = THAI_COPY.groups[group.title] || translateText(group.title, layerText.title || "", 0);
                return {
                  ...group,
                  title: groupTitle,
                  modules: group.modules.map((module) => {
                    const name = THAI_COPY.modules[module.id] || translateText(module.name, groupTitle, 0);
                    return {
                      ...module,
                      name,
                      summary: `${name}ช่วยกำหนดบทบาททางเทคนิคของระบบ SaaS การเงิน เชื่อมต่อกับชั้นอื่นเพื่อให้ระบบเสถียร ปลอดภัย และขยายได้`,
                      details: (module.details || []).map((item, index) => localizeDetail(item, name, index))
                    };
                  })
                };
              })
            };
          })
        };
      }

      const localizedArch = {
        zh: ARCH,
        th: buildThaiArch(ARCH)
      };

      function detailText(details) {
        return (details || []).map((item) => {
          if (typeof item === "string") return item;
          return [item.label, item.value, item.note].join(" ");
        }).join(" ");
      }

      function moduleText(module) {
        return normalize([module.name, module.en, module.summary, detailText(module.details)].join(" "));
      }

      function createEl(tag, className, text) {
        const el = document.createElement(tag);
        if (className) el.className = className;
        if (text !== undefined) el.textContent = text;
        return el;
      }

      function register(module, meta) {
        registry.set(module.id, { module, meta, searchText: moduleText(module) });
      }

      function rebuildRegistry() {
        registry.clear();
        currentArch.layers.forEach((layer, layerIndex) => {
          layer.groups.forEach((group, groupIndex) => {
            group.modules.forEach((module, moduleIndex) => {
              register(module, { layer, group, layerIndex, groupIndex, moduleIndex });
            });
          });
        });
      }

      function renderDetailPreview(module) {
        const list = createEl("ul", "print-details");
        (module.details || []).forEach((item) => {
          const text = typeof item === "string" ? item : `${item.label}: ${item.value}。${item.note}`;
          list.appendChild(createEl("li", "", text));
        });
        return list;
      }

      function renderLayer(layer, host, layerIndex, layerCount) {
        const layerEl = createEl("section", "layer");
        layerEl.style.setProperty("--layer-color", layer.accent || currentArch.primary);

        const label = createEl("div", "layer-label");
        const labelTitle = createEl("strong", "", layer.title);
        const labelEn = createEl("span", "", layer.en);
        label.append(labelTitle, labelEn);

        const body = createEl("div", "layer-body");
        const groups = createEl("div", "groups");

        layer.groups.forEach((group) => {
          const groupEl = createEl("div", "group");
          groupEl.style.setProperty("--group-color", group.color || layer.accent || currentArch.primary);
          groupEl.appendChild(createEl("div", "group-title", group.title));

          const cardsEl = createEl("div", "cards");
          group.modules.forEach((module) => {
            const card = createEl("button", "card");
            card.type = "button";
            card.dataset.id = module.id;
            card.style.setProperty("--group-color", group.color || layer.accent || currentArch.primary);
            card.appendChild(createEl("span", "card-name", module.name));
            card.appendChild(createEl("small", "card-en", module.en));
            card.appendChild(createEl("span", "card-summary", module.summary));
            card.appendChild(renderDetailPreview(module));
            card.addEventListener("click", () => openModule(module.id, false));
            cards.set(module.id, card);
            cardsEl.appendChild(card);
          });

          groupEl.appendChild(cardsEl);
          groups.appendChild(groupEl);
        });

        body.appendChild(groups);
        layerEl.append(label, body);
        host.appendChild(layerEl);

        if (host.classList.contains("main-stack") && layerIndex < layerCount - 1) {
          const arrow = createEl("div", "flow-arrow");
          arrow.appendChild(createEl("span", "", currentArch.flowLabel || "调用与数据流向"));
          host.appendChild(arrow);
        }
      }

      function renderDiagram() {
        diagram.replaceChildren();
        diagram.classList.remove("with-rail");
        cards.clear();
        const railLayer = currentArch.layers.find((layer) => layer.id === currentArch.railLayerId);
        const mainLayers = currentArch.layers.filter((layer) => layer.id !== currentArch.railLayerId);

        if (railLayer) {
          diagram.classList.add("with-rail");
          const mainStack = createEl("div", "main-stack");
          const railStack = createEl("aside", "rail-stack");
          mainLayers.forEach((layer, index) => renderLayer(layer, mainStack, index, mainLayers.length));
          renderLayer(railLayer, railStack, 0, 1);
          diagram.append(mainStack, railStack);
          return;
        }

        mainLayers.forEach((layer, index) => renderLayer(layer, diagram, index, mainLayers.length));
      }

      function relatedModules(id) {
        const entry = registry.get(id);
        if (!entry) return [];

        const explicit = entry.module.links || [];
        const ids = explicit.length ? [...explicit] : [];

        if (!ids.length) {
          const nextLayer = currentArch.layers[entry.meta.layerIndex + 1];
          const prevLayer = currentArch.layers[entry.meta.layerIndex - 1];
          [nextLayer, prevLayer].forEach((layer) => {
            const first = layer?.groups?.[0]?.modules?.[0];
            if (first) ids.push(first.id);
          });
        }

        const sameGroup = entry.meta.group.modules
          .filter((module) => module.id !== id)
          .slice(0, 2)
          .map((module) => module.id);

        return [...new Set([...ids, ...sameGroup])]
          .map((moduleId) => registry.get(moduleId)?.module)
          .filter(Boolean)
          .slice(0, 6);
      }

      function focusCard(id) {
        const card = cards.get(id);
        if (!card) return;
        card.scrollIntoView({ behavior: "smooth", block: "center", inline: "center" });
        card.classList.remove("pulse");
        void card.offsetWidth;
        card.classList.add("pulse");
        card.focus({ preventScroll: true });
      }

      function appendChoice(item) {
        const li = createEl("li");
        if (typeof item === "string") {
          li.textContent = item;
          return li;
        }

        li.appendChild(createEl("b", "", item.label));
        li.appendChild(createEl("span", "", item.value));
        li.appendChild(createEl("p", "", item.note));
        return li;
      }

      function openModule(id, jump) {
        const entry = registry.get(id);
        if (!entry) return;

        activeId = id;
        const module = entry.module;
        const color = entry.meta.group.color || entry.meta.layer.accent || currentArch.primary;
        modalRoot.style.setProperty("--active-color", color);
        modalTitle.textContent = module.name;
        modalEn.textContent = module.en;
        modalSummary.textContent = module.summary;
        modalDetails.replaceChildren();
        modalRelated.replaceChildren();

        (module.details || []).forEach((item) => {
          modalDetails.appendChild(appendChoice(item));
        });

        relatedModules(id).forEach((related) => {
          const button = createEl("button", "", `${related.name} · ${related.en}`);
          button.type = "button";
          button.addEventListener("click", () => {
            openModule(related.id, true);
          });
          modalRelated.appendChild(button);
        });

        modalRoot.hidden = false;
        document.body.style.overflow = "hidden";

        if (jump) {
          focusCard(id);
        }
      }

      function closeModal() {
        modalRoot.hidden = true;
        document.body.style.overflow = "";
        if (activeId) {
          cards.get(activeId)?.focus({ preventScroll: true });
        }
      }

      function applySearch() {
        const query = normalize(search.value);
        let count = 0;
        const ui = UI_TEXT[currentLang];

        registry.forEach((entry, id) => {
          const card = cards.get(id);
          const matched = !query || entry.searchText.includes(query);
          card.classList.toggle("match", Boolean(query && matched));
          card.classList.toggle("dim", Boolean(query && !matched));
          if (query && matched) count += 1;
        });

        hint.textContent = query ? ui.searchHint(count) : ui.idleHint;
      }

      function setLanguage(lang, clearSearch) {
        const openId = modalRoot.hidden ? null : activeId;
        currentLang = lang;
        currentArch = localizedArch[lang];
        document.documentElement.lang = UI_TEXT[lang].htmlLang;
        document.body.dataset.lang = lang;
        document.title = currentArch.title;
        document.documentElement.style.setProperty("--primary", currentArch.primary || "#2563EB");

        const ui = UI_TEXT[lang];
        title.textContent = currentArch.title;
        subtitle.textContent = currentArch.subtitle;
        badge.textContent = ui.badge;
        langToggle.textContent = ui.toggle;
        langToggle.setAttribute("aria-label", ui.toggleLabel);
        langToggle.setAttribute("aria-pressed", String(lang === "th"));
        close.setAttribute("aria-label", ui.closeLabel);
        summaryHeading.textContent = ui.summaryHeading;
        detailsHeading.textContent = ui.detailsHeading;
        relatedHeading.textContent = ui.relatedHeading;
        diagram.setAttribute("aria-label", ui.diagramLabel);
        search.placeholder = currentArch.searchPlaceholder || "搜索模块";
        if (clearSearch) search.value = "";

        rebuildRegistry();
        renderDiagram();
        applySearch();
        if (openId) openModule(openId, false);
      }

      setLanguage(currentLang, false);

      langToggle.addEventListener("click", () => {
        setLanguage(currentLang === "zh" ? "th" : "zh", true);
      });
      search.addEventListener("input", applySearch);
      overlay.addEventListener("click", closeModal);
      close.addEventListener("click", closeModal);
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !modalRoot.hidden) closeModal();
      });
    })();
  </script>
</body>
</html>
