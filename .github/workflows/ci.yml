name: CI

# 阶段 3-4 + REFACTOR-A1.2 · 最小 CI 自动化保险
# 防"v0.20 db pool 5 重演" · 每次 push / PR 必须五关都过:
#   1) import 静态检查
#   2) home.js i18n 4 语完整性(zh/en/th/ja key 集合一致)
#   3) unit tests 全绿
#   4) Vite build 跑通(REFACTOR-A1.2 加 · npm run build · 防本地 build 漏跑)
#   5) Playwright E2E smoke(pearnly.com 着陆页 · 顶栏 + 4 语切换 + 无 console error)
# 不依赖生产 secret · 不调后端业务(integ contract tests 全部 stub · e2e 只 GET 公开页)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

# 同一 ref 上有新 push 时取消旧 run · 省 CI 配额
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: import + i18n + unit + vite-build + e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Static import check
        run: python scripts/check_imports.py --quiet

      - name: i18n completeness check (home.js · zh/en/th/ja)
        run: python scripts/check_i18n.py --strict --quiet

      - name: Run unit tests
        run: python -m unittest discover -s tests/unit -p "test_*.py" -v

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node deps (npm ci · 严格按 lockfile)
        run: npm ci

      - name: Vite build (REFACTOR-A1.2 · 防本地 build 产物没提交)
        run: |
          npm run build
          # static/dist/main.js 是 A1.1 起的 Vite 产物 · 本地 build 后必须 commit
          # CI 这步重 build 一次 · 跑通 = 配置无脏 · 失败 = vite.config.mjs / src/main.js 有问题
          test -f static/dist/main.js || { echo "::error::vite build did not produce static/dist/main.js"; exit 1; }

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Install Chromium system deps
        run: npx playwright install-deps chromium

      - name: E2E smoke (Playwright · pearnly.com)
        run: npx playwright test
        env:
          PEARNLY_E2E_BASE_URL: https://pearnly.com

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
