<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pearnly Console</title>
    <link rel="icon" href="/static/landing/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/console/console-theme.css?v=1" />
    <link rel="stylesheet" href="/static/console/console.css?v=1" />
  </head>
  <body>
    <!-- 鉴权前置态:载入 / 未登录 / 无权限(SPA boot 决定显示谁) -->
    <div id="gateView" class="centerwrap">
      <div class="authcard" id="gateCard">
        <div class="brand"><span class="dot">P</span> Pearnly Console</div>
        <div class="skeleton"><i></i><i></i><i></i></div>
      </div>
    </div>

    <div id="appShell" class="shell" style="display: none">
      <aside class="sb">
        <div class="brand"><span class="dot">P</span> Pearnly Console</div>
        <a id="navTeam" class="on" data-view="members"
          ><span>👥</span> <span data-ct="nav_team"></span
        ></a>
        <a id="navSec" data-view="security"><span>🛡️</span> <span data-ct="nav_security"></span></a>
        <div class="foot">
          <a href="/home"><span>↩</span> <span data-ct="nav_back"></span></a>
          <a id="darkToggle"><span>◐</span> <span data-ct="nav_dark"></span></a>
          <a>
            <select
              id="langSel"
              style="
                background: var(--card);
                color: var(--ink);
                border: 1px solid var(--line);
                border-radius: 7px;
                padding: 3px 6px;
                font-size: 12px;
                width: 100%;
              "
            >
              <option value="th">ไทย</option>
              <option value="zh">中文</option>
              <option value="en">English</option>
              <option value="ja">日本語</option>
            </select>
          </a>
        </div>
      </aside>

      <main class="main">
        <!-- 屏1 · 成员列表 -->
        <section id="view-members">
          <div class="ph">
            <h2 data-ct="title_team"></h2>
            <span class="sub" data-ct="sub_team"></span>
          </div>
          <div class="action">
            <div>
              <div class="t" id="teamStat"></div>
              <div class="s" id="teamStat2"></div>
            </div>
            <button class="btn pri" id="btnInvite" data-ct="act_invite"></button>
          </div>
          <div id="membersBox"></div>
          <div class="card" id="pendingCard" style="display: none">
            <div class="hd">
              <span data-ct="inv_pending"></span> <span class="n" id="pendingCount"></span>
            </div>
            <div id="pendingBox"></div>
          </div>
          <div class="ph" style="margin-top: 6px">
            <span class="spacer"></span>
            <button class="btn ghost sm" id="btnHaveToken" data-ct="transfer_have_token"></button>
          </div>
        </section>

        <!-- 屏3 · 安全日志 -->
        <section id="view-security" style="display: none">
          <div class="ph">
            <h2 data-ct="title_security"></h2>
            <span class="sub" data-ct="sub_security"></span>
          </div>
          <div class="card"><div id="secBox"></div></div>
        </section>
      </main>
    </div>

    <!-- 屏2 · 邀请弹窗 -->
    <div class="modal-mask" id="inviteMask">
      <div class="modal">
        <div class="mh">
          <span data-ct="inv_title"></span><button class="x" data-close="inviteMask">×</button>
        </div>
        <div class="mb" id="inviteBody"></div>
      </div>
    </div>

    <!-- 转移所有权弹窗(发起 + 确认两形态) -->
    <div class="modal-mask" id="transferMask">
      <div class="modal">
        <div class="mh">
          <span data-ct="transfer_title"></span
          ><button class="x" data-close="transferMask">×</button>
        </div>
        <div class="mb" id="transferBody"></div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="/static/console/console-i18n.js?v=1"></script>
    <script src="/static/console/console.js?v=1"></script>
  </body>
</html>
