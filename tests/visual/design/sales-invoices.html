<!DOCTYPE html>
<html lang="th">
<head><meta charset="utf-8">
<style>
/* 风格 B · Emerald — 仅供 getComputedStyle 快照断言 */
:root {
  --accent: #0E7C66; --ink: #0B1A2B; --ink2: #5A6B7B;
  --r: 7px; --s1: 4px; --s5: 20px;
}
.ui .wrap { width: 100%; max-width: none; margin: 0; }
.ui .pagehead { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: var(--s5); }
.ui .pagehead .h1 { font-size: 22px; font-weight: 700; }
.btn-primary { background: #0E7C66; color: #fff; border-radius: 6px; padding: 9px 14px; font-size: 13.5px; font-weight: 600; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
</style>
</head>
<body>
<section id="page-sales-invoices" class="ui">
  <div class="wrap sx-page">
    <div class="pagehead">
      <div>
        <div class="h1">开票工作台</div>
      </div>
      <div class="sx-actions">
        <button class="btn btn-primary" id="sx-new-btn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>
          新建发票
        </button>
      </div>
    </div>
    <div id="sx-wb-body"></div>
  </div>
</section>
</body>
</html>
