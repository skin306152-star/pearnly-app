name: CI

# 阶段 3-4 + REFACTOR-A1.2 · 最小 CI 自动化保险
# 防"v0.20 db pool 5 重演" · 每次 push / PR 必须五关都过:
#   1) import 静态检查
#   2) home.js i18n 4 语完整性(zh/en/th/ja key 集合一致)
#   3) unit tests 全绿
#   4) Vite build 跑通(REFACTOR-A1.2 加 · npm run build · 防本地 build 漏跑)
#   5) Playwright E2E smoke(pearnly.com 着陆页 · 顶栏 + 4 语切换 + 无 console error)
# 不依赖生产 secret · 不调后端业务(integ contract tests 全部 stub · e2e 只 GET 公开页)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

# 同一 ref 上有新 push 时取消旧 run · 省 CI 配额
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # REFACTOR-A5 · 代码规范守门(与 test 并行 · 独立信号)
  #   black --check  : Python 格式化唯一权威
  #   ruff check     : Python pyflakes 真 bug(未定义名/未用导入/format 参数等)
  #   prettier --check: 前端代码格式(巨石 home.* 经 .prettierignore 豁免 · 阶段 C 拆解再纳入)
  #   eslint         : 前端模块真 bug(0 error 放行 · warning 仅提示)
  lint:
    name: lint (black + ruff + prettier + eslint)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools (REFACTOR-A5 · pinned black + ruff)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: black --check (Python 格式化)
        run: black --check .

      - name: ruff check (Python lint)
        run: ruff check .

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node deps (npm ci)
        run: npm ci

      - name: prettier --check (前端格式 · 巨石豁免)
        run: npm run format:check

      - name: eslint (前端模块 lint)
        run: npm run lint

  test:
    name: import + i18n + unit + vite-build + e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.lock.txt

      - name: Install dependencies (REFACTOR-A7 · 装 pip-compile 锁好的版本)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock.txt
          pip install coverage==7.14.0  # REFACTOR-A8 · 覆盖率工具(dev · 不进 prod lock)

      - name: Static import check
        run: python scripts/check_imports.py --quiet

      - name: i18n completeness check (home.js · zh/en/th/ja)
        run: python scripts/check_i18n.py --strict --quiet

      - name: Run unit tests (under coverage · REFACTOR-A8)
        run: coverage run -m unittest discover -s tests/unit -p "test_*.py"

      - name: Coverage report + ratchet (REFACTOR-A8 · fail_under 只升不降)
        run: |
          coverage report
          coverage xml

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node deps (npm ci · 严格按 lockfile)
        run: npm ci

      - name: Vite build (REFACTOR-A1.2 · 防本地 build 产物没提交)
        run: |
          npm run build
          # static/dist/main.js 是 A1.1 起的 Vite 产物 · 本地 build 后必须 commit
          # CI 这步重 build 一次 · 跑通 = 配置无脏 · 失败 = vite.config.mjs / src/main.js 有问题
          test -f static/dist/main.js || { echo "::error::vite build did not produce static/dist/main.js"; exit 1; }

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Install Chromium system deps
        run: npx playwright install-deps chromium

      - name: E2E smoke (Playwright · pearnly.com)
        run: npx playwright test
        env:
          PEARNLY_E2E_BASE_URL: https://pearnly.com

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
