# ============================================================
# Pearnly · 本地 dev override(REFACTOR-A3)
# ============================================================
# 叠在 docker-compose.yml 之上 · 把源码挂进容器 + 开 uvicorn 热重载 ·
# 改 .py 立即生效 · 不用每次 rebuild。
#
# 用法:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# 前端走 Vite 产物 static/dist/(已 commit · 随挂载可见)· 改前端源码需在宿主跑
# npm run build 重生成 dist · 后端 .py 改动则由 --reload 自动生效。
# ============================================================

services:
  app:
    # 挂载源码:改 .py 触发热重载(node_modules / .git 等由匿名卷遮蔽)
    volumes:
      - .:/app
      - /app/node_modules
      - pearnly-storage:/app/storage
    # 开热重载(开发用 · 生产不开)
    command: ["sh", "-c", "uvicorn app:app --host 0.0.0.0 --port ${PORT:-7860} --reload"]
    environment:
      LOG_LEVEL: DEBUG
