<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pearnly AI</title>
    <link rel="icon" href="/static/landing/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/dist/ai.css?v=2" />
  </head>
  <body>
    <div class="shell">
      <aside class="side">
        <a class="brand" id="brandHome">
          <div class="mono">P</div>
          <div class="word"><b data-at="brand_word"></b> <em data-at="brand_ai"></em></div>
        </a>
        <nav class="snav">
          <div class="lbl" data-at="nav_group_work"></div>
          <a class="on" id="navDash">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
              <rect x="3" y="3" width="7" height="7" rx="1.5" />
              <rect x="14" y="3" width="7" height="7" rx="1.5" />
              <rect x="3" y="14" width="7" height="7" rx="1.5" />
              <rect x="14" y="14" width="7" height="7" rx="1.5" />
            </svg>
            <span data-at="nav_dash"></span>
          </a>
          <a id="navTodo" aria-disabled="true">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
              <path
                d="M12 9v4m0 4h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"
              />
            </svg>
            <span data-at="nav_todo"></span>
          </a>
          <div class="lbl" data-at="nav_group_manage"></div>
          <a id="navClients" aria-disabled="true">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
            </svg>
            <span data-at="nav_clients"></span>
          </a>
          <a id="navReports" aria-disabled="true">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
              <path d="M18 20V10M12 20V4M6 20v-6" />
            </svg>
            <span data-at="nav_reports"></span>
          </a>
          <a id="navSettings" aria-disabled="true">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
              <circle cx="12" cy="12" r="3" />
            </svg>
            <span data-at="nav_settings"></span>
          </a>
        </nav>
        <div class="foot">
          <div class="fbadge">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
              <path d="M3 21h18M5 21V7l7-4 7 4v14" />
            </svg>
          </div>
          <small><b id="firmName"></b><br /><span id="firmMeta"></span></small>
        </div>
      </aside>

      <div class="main">
        <div class="topbar">
          <span class="crumb" id="crumb"></span>
          <div class="right">
            <div class="bell" id="bell" style="display: none">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0" />
              </svg>
            </div>
            <div class="who" id="whoWrap" style="display: none">
              <div class="av" id="whoAv"></div>
              <div class="wt"><b id="whoName"></b><small id="whoRole"></small></div>
            </div>
          </div>
        </div>

        <div class="content">
          <section class="view on" id="v-dashboard">
            <div class="toolrow">
              <div class="stat" id="statClients">
                <div class="ic">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                  </svg>
                </div>
                <div>
                  <div class="lb" data-at="stat_clients"></div>
                  <div class="v num" id="statClientsV">—</div>
                </div>
              </div>
              <div class="stat warn" id="statPending">
                <div class="ic">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                    <path
                      d="M12 9v4m0 4h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"
                    />
                  </svg>
                </div>
                <div>
                  <div class="lb" data-at="stat_pending"></div>
                  <div class="v num" id="statPendingV">—</div>
                </div>
              </div>
              <div class="stat" id="statRunning">
                <div class="ic">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                    <path d="M22 4 12 14.01l-3-3" />
                  </svg>
                </div>
                <div>
                  <div class="lb" data-at="stat_running"></div>
                  <div class="v num" id="statRunningV">—</div>
                </div>
              </div>
              <div class="search">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                  <circle cx="11" cy="11" r="8" />
                  <path d="m21 21-4.3-4.3" />
                </svg>
                <input id="searchInput" data-at-ph="search_ph" />
              </div>
            </div>

            <div class="board-head">
              <h2 data-at="board_title"></h2>
              <span class="note" data-at="board_note"></span>
            </div>
            <div id="dashBody"></div>
          </section>

          <section class="view" id="v-client">
            <div class="chead">
              <div class="who-ro">
                <div class="cavatar" id="clientAvatar"></div>
                <div>
                  <div class="ctitle" id="clientName"></div>
                  <div class="csub" data-at="client_readonly_note"></div>
                </div>
              </div>
              <div class="period-pick">
                <button class="pk" id="periodBtn" type="button">
                  <span class="pl" data-at="period_label"></span><b id="periodValue">—</b>
                </button>
                <div class="period-menu" id="periodMenu"></div>
              </div>
            </div>

            <div class="ctabs" id="clientTabs">
              <button data-view="intake" id="tabIntake"><span data-at="tab_intake"></span></button>
              <button data-view="wo" id="tabWo"><span data-at="tab_wo"></span></button>
              <button data-view="review" id="tabReview"><span data-at="tab_review"></span></button>
              <button data-view="pkg" id="tabPkg"><span data-at="tab_pkg"></span></button>
            </div>

            <div class="cview" id="cv-intake"></div>
            <div class="cview" id="cv-wo"></div>
            <div class="cview" id="cv-review"></div>
            <div class="cview" id="cv-pkg"></div>
          </section>
        </div>
      </div>
    </div>

    <script src="/static/ai/ai-i18n.js?v=2"></script>
    <script src="/static/dist/ai.js?v=2" defer></script>
  </body>
</html>
