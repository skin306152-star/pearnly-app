<!DOCTYPE html>
<html lang="th">
<head><meta charset="utf-8">
<style>
/* 风格 B · Emerald — 仅供 getComputedStyle 快照断言 */
:root {
  --accent: #0E7C66; --accent-ink: #fff;
  --card: #fff; --line: #E7EAEE; --ink: #0B1A2B; --ink2: #5A6B7B;
  --r: 7px; --rs: 6px; --sh: 0 1px 2px rgba(11,26,43,.06);
  --s3: 12px; --s4: 16px; --s5: 20px; --s6: 24px;
}
/* .panel.box 组合 → border-radius:.rs=6px(box 覆盖 panel 的 7px) */
.ui .panel {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--rs);   /* 6px — 与生产 .panel.box 一致 */
  box-shadow: var(--sh);
}
.ui .btn { border: 1px solid transparent; border-radius: var(--rs); padding: 9px 14px; font-weight: 600; font-size: 13.5px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
.ui .btn.pri { background: var(--accent); color: var(--accent-ink); }
.ui .wrap { width: 100%; max-width: none; margin: 0; }
.ui .pagehead { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 20px; }
.ui .pagehead .h1 { font-size: 22px; font-weight: 700; }
</style>
</head>
<body>
<section id="page-ocr" class="ui">
  <div class="wrap">
    <div class="pagehead">
      <div>
        <div class="h1">上传识别</div>
        <div class="sub">把票据一拍 · 数据自动进 Excel 和 ERP</div>
      </div>
    </div>
    <div class="panel" style="padding:20px 24px;margin-bottom:16px">
      <div class="ocr-card-title">上传 PDF 文件</div>
      <svg class="ic" viewBox="0 0 24 24"><path d="M12 3v12"/></svg>
    </div>
  </div>
</section>
</body>
</html>
