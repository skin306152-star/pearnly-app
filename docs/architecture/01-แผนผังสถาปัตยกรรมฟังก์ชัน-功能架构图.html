  <style>
    :root {
      --primary: #2563EB;
      --bg: #FAFAF8;
      --card: #FFFFFF;
      --text: #1F2937;
      --muted: #6B7280;
      --line: #E5E7EB;
      --soft: #F4F4F1;
      --shadow: 0 18px 48px rgba(15, 23, 42, 0.12);
      --radius: 16px;
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      line-height: 1.55;
    }

    button,
    input {
      font: inherit;
    }

    .shell {
      width: min(1480px, calc(100% - 40px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }

    .hero {
      display: grid;
      gap: 18px;
      margin-bottom: 22px;
    }

    .title-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 10px 0 0;
      max-width: 820px;
      color: var(--muted);
      font-size: 16px;
    }

    .badge {
      flex: 0 0 auto;
      border: 1px solid rgba(37, 99, 235, 0.22);
      color: var(--primary);
      background: rgba(37, 99, 235, 0.08);
      border-radius: 999px;
      padding: 8px 13px;
      font-size: 13px;
      font-weight: 700;
    }

    .hero-actions {
      display: flex;
      flex: 0 0 auto;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .lang-toggle {
      min-width: 78px;
      height: 36px;
      border: 1px solid rgba(37, 99, 235, 0.26);
      border-radius: 999px;
      background: #fff;
      color: var(--primary);
      cursor: pointer;
      font-size: 13px;
      font-weight: 800;
      transition: background 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .lang-toggle:hover {
      background: rgba(37, 99, 235, 0.08);
      box-shadow: 0 8px 22px rgba(37, 99, 235, 0.12);
      transform: translateY(-1px);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 520px) auto;
      gap: 14px;
      align-items: center;
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      backdrop-filter: blur(8px);
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap::before {
      content: "";
      position: absolute;
      left: 14px;
      top: 50%;
      width: 14px;
      height: 14px;
      border: 2px solid #94A3B8;
      border-radius: 50%;
      transform: translateY(-50%);
    }

    .search-wrap::after {
      content: "";
      position: absolute;
      left: 27px;
      top: calc(50% + 7px);
      width: 7px;
      height: 2px;
      background: #94A3B8;
      transform: rotate(45deg);
      transform-origin: left center;
    }

    #search {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0 16px 0 44px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    #search:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .diagram {
      display: grid;
      gap: 12px;
    }

    .layer {
      display: grid;
      grid-template-columns: 168px minmax(0, 1fr);
      overflow: hidden;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 12px 34px rgba(15, 23, 42, 0.06);
    }

    .layer-label {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 7px;
      min-height: 180px;
      padding: 18px 16px;
      color: #fff;
      background: linear-gradient(180deg, var(--layer-color), color-mix(in srgb, var(--layer-color) 72%, #111827));
      writing-mode: horizontal-tb;
      transform: none;
      text-align: left;
    }

    .layer-label strong {
      font-size: 16px;
      letter-spacing: 0;
    }

    .layer-label span {
      opacity: 0.82;
      font-size: 12px;
      letter-spacing: 0;
    }

    .layer-body {
      padding: 18px;
    }

    .groups {
      display: grid;
      gap: 16px;
    }

    .group {
      border: 1px solid color-mix(in srgb, var(--group-color) 24%, var(--line));
      border-radius: 14px;
      background: linear-gradient(180deg, color-mix(in srgb, var(--group-color) 7%, #fff), #fff 58%);
      padding: 14px;
    }

    .group-title {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 12px;
      color: color-mix(in srgb, var(--group-color) 75%, #111827);
      font-weight: 800;
      font-size: 15px;
    }

    .group-title::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--group-color);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--group-color) 15%, transparent);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(148px, 1fr));
      gap: 10px;
    }

    .card {
      min-height: 104px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--card);
      padding: 13px 12px;
      text-align: left;
      color: inherit;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease, opacity 160ms ease;
      position: relative;
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-4px);
      border-color: color-mix(in srgb, var(--group-color) 50%, var(--primary));
      box-shadow: 0 14px 28px rgba(15, 23, 42, 0.12);
      outline: none;
    }

    .card-name {
      display: block;
      font-weight: 800;
      font-size: 15px;
      color: #111827;
    }

    .card-en {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .card-summary {
      display: block;
      margin-top: 10px;
      color: #64748B;
      font-size: 12px;
      line-height: 1.45;
    }

    .card.match {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14), 0 14px 28px rgba(15, 23, 42, 0.10);
    }

    .card.dim {
      opacity: 0.26;
    }

    .card.pulse {
      animation: pulse 900ms ease;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.36); }
      100% { box-shadow: 0 0 0 16px rgba(37, 99, 235, 0); }
    }

    .flow-arrow {
      display: grid;
      place-items: center;
      min-height: 34px;
      color: var(--muted);
      font-size: 12px;
    }

    .flow-arrow span {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      padding: 5px 12px;
    }

    .flow-arrow span::after {
      content: "↓";
      color: var(--primary);
      font-weight: 900;
      font-size: 16px;
    }

    .print-details {
      display: none;
    }

    .modal-root[hidden] {
      display: none;
    }

    .modal-root {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 22px;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(17, 24, 39, 0.42);
      backdrop-filter: blur(6px);
    }

    .modal {
      position: relative;
      width: min(720px, 100%);
      max-height: min(760px, calc(100vh - 44px));
      overflow: auto;
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 18px;
      background: #fff;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .modal-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 36px;
      gap: 16px;
      align-items: start;
    }

    .modal h2 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
    }

    .modal small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
    }

    .close {
      width: 36px;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: #334155;
      cursor: pointer;
    }

    .close:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .section-title {
      margin: 22px 0 8px;
      font-size: 13px;
      color: #334155;
      font-weight: 900;
    }

    .modal-summary {
      margin: 16px 0 0;
      padding: 13px 14px;
      border-left: 4px solid var(--active-color, var(--primary));
      border-radius: 12px;
      background: color-mix(in srgb, var(--active-color, var(--primary)) 8%, #fff);
      color: #334155;
    }

    .detail-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .detail-list li {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 9px 10px;
      background: #FAFAF8;
      color: #334155;
      font-size: 14px;
    }

    .related {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .related button {
      border: 1px solid color-mix(in srgb, var(--active-color, var(--primary)) 28%, var(--line));
      border-radius: 999px;
      background: color-mix(in srgb, var(--active-color, var(--primary)) 8%, #fff);
      color: color-mix(in srgb, var(--active-color, var(--primary)) 78%, #111827);
      padding: 7px 11px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }

    .related button:hover {
      border-color: var(--active-color, var(--primary));
    }

    @media (max-width: 820px) {
      .shell {
        width: min(100% - 24px, 720px);
        padding-top: 22px;
      }

      .title-row,
      .toolbar {
        grid-template-columns: 1fr;
        display: grid;
      }

      .badge,
      .hero-actions,
      .hint {
        justify-self: start;
        text-align: left;
      }

      .layer {
        display: block;
      }

      .layer-label {
        min-height: auto;
        writing-mode: horizontal-tb;
        transform: none;
        justify-content: flex-start;
        padding: 14px 16px;
      }

      .cards,
      .detail-list {
        grid-template-columns: 1fr;
      }

      .modal {
        padding: 20px;
      }
    }

    @media print {
      body {
        background: #fff;
      }

      .shell {
        width: 100%;
        padding: 0;
      }

      .toolbar,
      .flow-arrow,
      .lang-toggle,
      .modal-root {
        display: none !important;
      }

      .hero {
        margin-bottom: 12px;
      }

      .badge {
        border-color: #CBD5E1;
        color: #334155;
        background: #fff;
      }

      .layer {
        display: block;
        break-inside: avoid;
        box-shadow: none;
        margin-bottom: 12px;
      }

      .layer-label {
        min-height: auto;
        writing-mode: horizontal-tb;
        transform: none;
        justify-content: flex-start;
        color: #111827;
        background: #F1F5F9;
        border-bottom: 1px solid #CBD5E1;
      }

      .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .card {
        break-inside: avoid;
        min-height: auto;
        box-shadow: none;
      }

      .card-summary {
        color: #334155;
      }

      .print-details {
        display: block;
        margin: 8px 0 0;
        padding-left: 18px;
        color: #334155;
        font-size: 11px;
      }
    }
  </style>
</head>

        ["商机", "โอกาสขาย"],
        ["跟进", "ติดตาม"],
        ["报价", "ใบเสนอราคา"],
        ["售后", "บริการหลังการขาย"],
        ["知识库", "คลังความรู้"],
        ["看板", "แดชบอร์ด"],
        ["分析", "วิเคราะห์"],
        ["维度", "มิติ"],
        ["钻取", "เจาะลึก"],
        ["合并", "รวมงบ"],
        ["币种", "สกุลเงิน"],
        ["汇率", "อัตราแลกเปลี่ยน"],
        ["租户", "ผู้เช่า"],
        ["套餐", "แพ็กเกจ"],
        ["用量", "การใช้งาน"],
        ["账单", "บิล"],
        ["监控", "มอนิเตอร์"],
        ["告警", "แจ้งเตือน"],
        ["灰度", "ค่อย ๆ เปิดใช้"],
        ["回滚", "ย้อนกลับ"],
        ["发布", "ปล่อยใช้งาน"],
        ["归档", "จัดเก็บถาวร"],
        ["备份", "สำรองข้อมูล"],
        ["恢复", "กู้คืน"],
        ["加密", "เข้ารหัส"],
        ["销毁", "ทำลายข้อมูล"],
        ["OCR", "OCR"],
        ["AI", "AI"],
        ["Webhook", "Webhook"],
        ["API", "API"],
        ["Excel", "Excel"],
        ["IM", "IM"],
        ["SSO", "SSO"],
        ["MFA", "MFA"],
        ["SLA", "SLA"]
      ];

      const title = document.getElementById("page-title");
      const subtitle = document.getElementById("page-subtitle");
      const badge = document.getElementById("page-badge");
      const langToggle = document.getElementById("lang-toggle");
      const search = document.getElementById("search");
      const hint = document.getElementById("search-hint");
      const diagram = document.getElementById("diagram");
      const modalRoot = document.getElementById("modal-root");
      const overlay = document.getElementById("overlay");
      const close = document.getElementById("close");
      const modalTitle = document.getElementById("modal-title");
      const modalEn = document.getElementById("modal-en");
      const modalSummary = document.getElementById("modal-summary");
      const modalDetails = document.getElementById("modal-details");
      const modalRelated = document.getElementById("modal-related");
      const detailsHeading = document.getElementById("details-heading");
      const relatedHeading = document.getElementById("related-heading");

      const registry = new Map();
      const cards = new Map();
      let activeId = null;
      let currentLang = "zh";
      let currentArch = ARCH;

      function hasHan(value) {
        return /[\u3400-\u9FFF]/.test(String(value || ""));
      }

      function normalize(value) {
        return String(value || "").toLowerCase().replace(/\s+/g, "");
      }

      function compactAscii(value) {
        return String(value || "")
          .replace(/[\u3400-\u9FFF\u3000-\u303F，。；、（）]/g, " ")
          .replace(/[·]/g, " ")
          .replace(/\s+/g, " ")
          .trim();
      }

      function translateText(value, moduleName, index) {
        const text = String(value || "");
        if (!hasHan(text)) return text;
        const parts = [];
        THAI_TERM_RULES.forEach(([key, label]) => {
          if (text.includes(key) && !parts.includes(label)) parts.push(label);
        });
        const ascii = compactAscii(text);
        if (parts.length && ascii) return `${parts.join(" / ")} · ${ascii}`;
        if (parts.length) return parts.join(" / ");
        return `${moduleName} · รายการ ${index + 1}`;
      }

      function buildThaiArch(source) {
        return {
          ...source,
          title: THAI_COPY.title,
          subtitle: THAI_COPY.subtitle,
          searchPlaceholder: THAI_COPY.searchPlaceholder,
          flowLabel: THAI_COPY.flowLabel,
          layers: source.layers.map((layer, layerIndex) => {
            const layerText = THAI_COPY.layers[layer.id] || {};
            return {
              ...layer,
              title: layerText.title || `ชั้นที่ ${layerIndex + 1}`,
              en: layerText.en || layer.en,
              groups: layer.groups.map((group) => {
                const groupTitle = THAI_COPY.groups[group.title] || translateText(group.title, layerText.title || "", 0);
                return {
                  ...group,
                  title: groupTitle,
                  modules: group.modules.map((module) => {
                    const name = THAI_COPY.modules[module.id] || translateText(module.name, groupTitle, 0);
                    return {
                      ...module,
                      name,
                      summary: `รองรับ${name}ในกลุ่ม${groupTitle} เชื่อมโยงข้อมูล กระบวนการ สิทธิ์ และรายงานให้ทำงานร่วมกันในระบบ SaaS เดียว`,
                      details: (module.details || []).map((item, index) => translateText(item, name, index))
                    };
                  })
                };
              })
            };
          })
        };
      }

      const localizedArch = {
        zh: ARCH,
        th: buildThaiArch(ARCH)
      };

      function moduleText(module) {
        return normalize([module.name, module.en, module.summary, ...(module.details || [])].join(" "));
      }

      function createEl(tag, className, text) {
        const el = document.createElement(tag);
        if (className) el.className = className;
        if (text !== undefined) el.textContent = text;
        return el;
      }

      function register(module, meta) {
        registry.set(module.id, { module, meta, searchText: moduleText(module) });
      }

      function rebuildRegistry() {
        registry.clear();
        currentArch.layers.forEach((layer, layerIndex) => {
          layer.groups.forEach((group, groupIndex) => {
            group.modules.forEach((module, moduleIndex) => {
              register(module, { layer, group, layerIndex, groupIndex, moduleIndex });
            });
          });
        });
      }

      function renderLayer(layer, layerIndex) {
        const layerEl = createEl("section", "layer");
        layerEl.style.setProperty("--layer-color", layer.accent || currentArch.primary);

        const label = createEl("div", "layer-label");
        const labelTitle = createEl("strong", "", layer.title);
        const labelEn = createEl("span", "", layer.en);
        label.append(labelTitle, labelEn);

        const body = createEl("div", "layer-body");
        const groups = createEl("div", "groups");

        layer.groups.forEach((group) => {
          const groupEl = createEl("div", "group");
          groupEl.style.setProperty("--group-color", group.color || layer.accent || currentArch.primary);
          groupEl.appendChild(createEl("div", "group-title", group.title));

          const cardsEl = createEl("div", "cards");
          group.modules.forEach((module) => {
            const card = createEl("button", "card");
            card.type = "button";
            card.dataset.id = module.id;
            card.style.setProperty("--group-color", group.color || layer.accent || currentArch.primary);
            card.appendChild(createEl("span", "card-name", module.name));
            card.appendChild(createEl("small", "card-en", module.en));
            card.appendChild(createEl("span", "card-summary", module.summary));

            const printDetails = createEl("ul", "print-details");
            (module.details || []).forEach((item) => {
              printDetails.appendChild(createEl("li", "", item));
            });
            card.appendChild(printDetails);

            card.addEventListener("click", () => openModule(module.id, false));
            cards.set(module.id, card);
            cardsEl.appendChild(card);
          });

          groupEl.appendChild(cardsEl);
          groups.appendChild(groupEl);
        });

        body.appendChild(groups);
        layerEl.append(label, body);
        diagram.appendChild(layerEl);

        if (layerIndex < currentArch.layers.length - 1) {
          const arrow = createEl("div", "flow-arrow");
          arrow.appendChild(createEl("span", "", currentArch.flowLabel || "调用与数据流向"));
          diagram.appendChild(arrow);
        }
      }

      function renderDiagram() {
        diagram.replaceChildren();
        cards.clear();
        currentArch.layers.forEach(renderLayer);
      }

      function relatedModules(id) {
        const entry = registry.get(id);
        if (!entry) return [];

        const explicit = entry.module.links || [];
        const ids = explicit.length ? [...explicit] : [];

        if (!ids.length) {
          const nextLayer = currentArch.layers[entry.meta.layerIndex + 1];
          const prevLayer = currentArch.layers[entry.meta.layerIndex - 1];
          [nextLayer, prevLayer].forEach((layer) => {
            const first = layer?.groups?.[0]?.modules?.[0];
            if (first) ids.push(first.id);
          });
        }

        const sameGroup = entry.meta.group.modules
          .filter((module) => module.id !== id)
          .slice(0, 2)
          .map((module) => module.id);

        return [...new Set([...ids, ...sameGroup])]
          .map((moduleId) => registry.get(moduleId)?.module)
          .filter(Boolean)
          .slice(0, 6);
      }

      function focusCard(id) {
        const card = cards.get(id);
        if (!card) return;
        card.scrollIntoView({ behavior: "smooth", block: "center", inline: "center" });
        card.classList.remove("pulse");
        void card.offsetWidth;
        card.classList.add("pulse");
        card.focus({ preventScroll: true });
      }

      function openModule(id, jump) {
        const entry = registry.get(id);
        if (!entry) return;

        activeId = id;
        const module = entry.module;
        const color = entry.meta.group.color || entry.meta.layer.accent || currentArch.primary;
        modalRoot.style.setProperty("--active-color", color);
        modalTitle.textContent = module.name;
        modalEn.textContent = module.en;
        modalSummary.textContent = module.summary;
        modalDetails.replaceChildren();
        modalRelated.replaceChildren();

        (module.details || []).forEach((item) => {
          modalDetails.appendChild(createEl("li", "", item));
        });

        relatedModules(id).forEach((related) => {
          const button = createEl("button", "", `${related.name} · ${related.en}`);
          button.type = "button";
          button.addEventListener("click", () => {
            openModule(related.id, true);
          });
          modalRelated.appendChild(button);
        });

        modalRoot.hidden = false;
        document.body.style.overflow = "hidden";

        if (jump) {
          focusCard(id);
        }
      }

      function closeModal() {
        modalRoot.hidden = true;
        document.body.style.overflow = "";
        if (activeId) {
          cards.get(activeId)?.focus({ preventScroll: true });
        }
      }

      function applySearch() {
        const query = normalize(search.value);
        let count = 0;
        const ui = UI_TEXT[currentLang];

        registry.forEach((entry, id) => {
          const card = cards.get(id);
          const matched = !query || entry.searchText.includes(query);
          card.classList.toggle("match", Boolean(query && matched));
          card.classList.toggle("dim", Boolean(query && !matched));
          if (query && matched) count += 1;
        });

        hint.textContent = query ? ui.searchHint(count) : ui.idleHint;
      }

      function setLanguage(lang, clearSearch) {
        const openId = modalRoot.hidden ? null : activeId;
        currentLang = lang;
        currentArch = localizedArch[lang];
        document.documentElement.lang = UI_TEXT[lang].htmlLang;
        document.body.dataset.lang = lang;
        document.title = currentArch.title;
        document.documentElement.style.setProperty("--primary", currentArch.primary || "#2563EB");

        const ui = UI_TEXT[lang];
        title.textContent = currentArch.title;
        subtitle.textContent = currentArch.subtitle;
        badge.textContent = ui.badge;
        langToggle.textContent = ui.toggle;
        langToggle.setAttribute("aria-label", ui.toggleLabel);
        langToggle.setAttribute("aria-pressed", String(lang === "th"));
        close.setAttribute("aria-label", ui.closeLabel);
        detailsHeading.textContent = ui.detailsHeading;
        relatedHeading.textContent = ui.relatedHeading;
        diagram.setAttribute("aria-label", ui.diagramLabel);
        search.placeholder = currentArch.searchPlaceholder || "搜索模块";
        if (clearSearch) search.value = "";

        rebuildRegistry();
        renderDiagram();
        applySearch();
        if (openId) openModule(openId, false);
      }

      setLanguage(currentLang, false);

      langToggle.addEventListener("click", () => {
        setLanguage(currentLang === "zh" ? "th" : "zh", true);
      });
      search.addEventListener("input", applySearch);
      overlay.addEventListener("click", closeModal);
      close.addEventListener("click", closeModal);
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !modalRoot.hidden) closeModal();
      });
    })();
  </script>
</body>
