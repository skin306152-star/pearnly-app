<!DOCTYPE html>
<html lang="th">
<head><meta charset="utf-8">
<style>
/* 风格 B · Emerald — 仅供 getComputedStyle 快照断言 */
:root {
  --accent: #7C4DFF; --accent-ink: #fff;
  --card: #fff; --line: #ECE8F6; --ink: #231942; --ink2: #5B5875;
  --r: 7px; --rs: 6px; --sh: 0 1px 2px rgba(11,26,43,.06);
  --s1: 4px; --s3: 12px; --s4: 16px; --s5: 20px;
}
.ui .panel {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r);
  box-shadow: var(--sh);
}
.ui .wrap { width: 100%; max-width: none; margin: 0; }
.ui .pagehead { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 20px; }
.ui .pagehead .h1 { font-size: 22px; font-weight: 700; }
.ui .pagehead .sub { color: var(--ink2); font-size: 13.5px; margin-top: var(--s1); }
</style>
</head>
<body>
<section id="page-history" class="ui">
  <div class="wrap">
    <div class="pagehead">
      <div>
        <div class="h1">识别历史</div>
        <div class="sub">保留近 90 天 · 点击行查看详情</div>
      </div>
    </div>
    <div class="panel" id="history-main">
      <div style="padding:16px 20px 12px;font-size:14px;font-weight:600;">识别记录</div>
    </div>
  </div>
</section>
</body>
</html>
