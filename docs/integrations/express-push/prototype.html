function renderConnectionDetail(){const c=connections.find(x=>x.id===(state.detailId||'express'))||connections[0];const si=statusInfo(c.status);return `<section class="panel"><div class="panel-head"><div><button class="chip" onclick="state.connectionDetail=false;render()">← ${t('tabConnections')}</button><h3 class="panel-title" style="margin-top:10px">${c.name} · ${c.company}</h3><p class="panel-sub">Agent, queue และประวัติการส่งของ connection นี้</p></div><div class="top-actions"><button class="btn">หยุดส่งชั่วคราว</button><button class="btn">สร้าง token ใหม่</button></div></div><div class="panel-body detail-grid"><div><div class="agent-hero"><div class="agent-line"><div class="agent-pc"><div class="pc-icon">PC</div><div><h3>${c.pc}</h3><p>Agent v${c.version} · heartbeat ${c.heartbeat}</p></div></div><span class="status ${si.cls}"><i></i>${si.label}</span></div>${c.status==='offline'?`<div class="mini-warning">小助手离线，${c.pending} 单等待。请确认电脑已开机并联网。 <button class="chip" onclick="toast('กำลังตรวจใหม่...')">重新检测</button></div>`:''}<div class="metric-grid"><div class="metric"><span>วันนี้</span><b>${c.today}</b></div><div class="metric"><span>สัปดาห์นี้</span><b>164</b></div><div class="metric"><span>ค้างส่ง</span><b>${c.queue}</b></div><div class="metric"><span>สำเร็จ</span><b>98.6%</b></div></div></div><h3 style="margin:16px 0 10px">สถิติ 7 วัน</h3><div class="spark"><svg viewBox="0 0 360 96" preserveAspectRatio="none"><path d="M0,72 C42,60 52,50 88,55 S144,74 180,44 232,28 268,38 320,34 360,18" fill="none" stroke="currentColor" stroke-width="3" opacity=".55"/></svg></div></div><div><h3 style="margin:0 0 10px">รายการล่าสุด</h3><div class="records">${queue.slice(0,4).map(q=>`<div class="record" onclick="openDrawer('${q.id}')"><div><strong>${q.vendor}</strong><small>${q.id} · ${q.amount}</small></div>${statusBadge(q.status)}</div>`).join('')}</div></div></div></section>`}
function statusBadge(s){const si=statusInfo(s);return `<span class="status ${si.cls}"><i></i>${si.label}</span>`}
function renderPushCenter(){const counts={pending:queue.filter(x=>x.status==='pending').length,pushing:queue.filter(x=>x.status==='pushing').length,done:queue.filter(x=>x.status==='done').length,failed:queue.filter(x=>x.status==='failed').length};const rows=queue.filter(x=>state.queueFilter==='all'||x.status===state.queueFilter);return `<section class="panel"><div class="panel-head"><div><h3 class="panel-title">${t('pushCenter')}</h3><p class="panel-sub">ดูทุกใบที่กำลังรอส่ง เข้า Express หรือส่งสำเร็จแล้ว</p></div><button class="btn" onclick="simulatePushOnce()">จำลองสถานะไหล</button></div><div class="panel-body"><div class="queue-banner ${connections[2].status==='offline'?'show':''}"><span>小助手离线，5 单等待中；Agent 上线后会自动补推。</span><button class="btn" onclick="toast('ตรวจพบ Agent ออนไลน์แล้ว');connections[2].status='connected';render()">重新检测</button></div><div class="filters"><div class="seg">${['pending','pushing','done','failed'].map(s=>`<button class="${state.queueFilter===s?'active':''}" onclick="state.queueFilter='${s}';render()">${statusInfo(s).label} ${counts[s]}</button>`).join('')}</div><label class="input"><span>ค้นหา</span><input placeholder="ผู้ขาย / จำนวนเงิน / เลขที่" /></label><button class="btn">วันที่</button><button class="btn">账套</button><button class="btn">批量推送</button><button class="btn">批量重试</button></div><div class="table">${rows.map(q=>queueRow(q)).join('')||`<div class="empty" style="min-height:260px;border:0"><div class="empty-icon">0</div><h3>ไม่มีรายการในสถานะนี้</h3><p>เมื่อมีรายการใหม่ ระบบจะเติมเข้ามาเองแบบ real-time</p></div>`}</div></div></section>`}
function queueRow(q){return `<div class="row"><input type="checkbox" aria-label="select ${q.id}"/><div class="invoice-main"><div class="thumb"></div><div><b>${q.vendor}</b><small>${q.id} · ${q.time}</small></div></div><div class="hide-mobile"><span class="confidence ${q.conf==='high'?'green':'amber'}">${q.conf==='high'?'สูง':'กลาง'}</span></div><div class="hide-mobile">${q.amount}</div><div class="hide-mobile">${q.target}</div><div>${statusBadge(q.status)}</div><div style="display:flex;gap:6px;justify-content:flex-end"><button class="chip" onclick="openDrawer('${q.id}')">ดู</button>${q.status==='failed'?`<button class="chip" onclick="retry('${q.id}')">重试</button>`:''}</div></div>`}
function simulatePushOnce(){const p=queue.find(x=>x.status==='pending');if(p){p.status='pushing';toast('เริ่มส่ง '+p.id);render();setTimeout(()=>{p.status=Math.random()>.18?'done':'failed';p.express=p.status==='done'?'RR240620-'+String(Math.floor(Math.random()*80+20)).padStart(3,'0'):'-';p.err=p.status==='failed'?'Express ไม่ตอบสนอง / timeout':'';render();toast(p.status==='done'?'ส่งสำเร็จ '+p.express:'ส่งไม่สำเร็จ ส่งเข้ารีวิวได้');},1400);return}const pushing=queue.find(x=>x.status==='pushing');if(pushing){pushing.status='done';pushing.express='RR240620-099';render();toast('ส่งสำเร็จ RR240620-099')}else toast('ไม่มีรายการรอส่ง')}
let liveTimer=null;function toggleLive(){state.autoLive=!state.autoLive;if(state.autoLive){liveTimer=setInterval(simulatePushOnce,3200);toast('เปิด real-time demo')}else{clearInterval(liveTimer);toast('หยุด real-time demo')}render()}
function retry(id){const q=queue.find(x=>x.id===id);q.status='pushing';q.err='';render();setTimeout(()=>{q.status='done';q.express='RR240620-077';render();toast('重试成功 '+q.express)},1000)}
function renderReview(){if(!reviews.length)return `<section class="panel"><div class="empty"><div class="empty-icon">✓</div><h3>ไม่มีรายการรอตรวจสอบ</h3><p>角标归零。低置信与失败单会在这里出现。</p></div></section>`;const r=reviews[state.reviewIndex]||reviews[0];return `<section class="panel"><div class="panel-head"><div><h3 class="panel-title">${t('reviewTitle')}</h3><p class="panel-sub">处理完一张自动切到下一张，角标实时减少</p></div><span class="badge">${reviews.length}</span></div><div class="panel-body review-layout"><div class="review-stack">${reviews.map((x,i)=>`<div class="review-item ${i===state.reviewIndex?'active':''}" onclick="state.reviewIndex=${i};render()"><div class="thumb"></div><div><b>${x.vendor}</b><small>${x.amount}</small><div class="reason-tags" style="margin-top:6px">${x.reason.slice(0,1).map(a=>`<span class="tag">${a}</span>`).join('')}</div></div></div>`).join('')}</div><div class="review-main"><div class="review-header"><div><b>${r.id} · ${r.vendor}</b><div class="reason-tags" style="margin-top:8px">${r.reason.map(a=>`<span class="tag" style="background:var(--amber-bg);color:var(--amber)">${a}</span>`).join('')}</div></div><button class="chip" onclick="openDrawer('${r.id}')">查看分录</button></div><div class="review-content"><div class="doc-preview"><div class="invoice-paper"><div class="paper-line short"></div><div class="paper-line mid"></div><div class="paper-line"></div><div class="paper-line"></div><div class="paper-line mid"></div><div style="height:90px"></div><div class="paper-line"></div><div class="paper-line mid"></div><div class="paper-total">TOTAL ${r.amount}</div></div></div><div class="field-list">${reviewFields(r).join('')}</div></div><div class="review-actions"><button class="btn" onclick="toggleReviewEdit()">${t('edit')}</button><button class="btn" onclick="processReview('ignore')">${t('ignore')}</button><button class="btn brand" onclick="processReview('confirm')">${t('confirmPush')}</button></div></div></div></section>`}
function reviewFields(r){const fields=[['ผู้ขาย',r.vendor,'vendor'],['เลขผู้เสียภาษี','0105562088?','taxId'],['เลขที่ใบกำกับ','RR581231-002','invoice'],['วันที่','20/06/2569','date'],['มูลค่าก่อน VAT','375,347.20','subtotal'],['VAT','26,274.30','vat'],['ยอดรวม',r.amount,'amount']];return fields.map(([l,v,k])=>`<div class="field ${r.field===k?'suspect':''}"><label>${l}</label><input value="${v}" ${state.reviewEdit?'':'readonly'} /></div>`)}
function toggleReviewEdit(){state.reviewEdit=!state.reviewEdit;render();toast(state.reviewEdit?'เปิดให้แก้ไขในช่องแล้ว':'ล็อกช่องแก้ไขแล้ว')}
function processReview(type){const r=reviews[state.reviewIndex];if(!r)return;if(type==='confirm'){queue.unshift({id:r.id.replace('REV','INV'),vendor:r.vendor,amount:r.amount,conf:'mid',target:'DATAT',status:'pending',time:'now',express:'-',err:''});toast('ส่งเข้าคิวแล้ว: '+r.vendor)}else toast('ข้ามรายการ: '+r.vendor);reviews.splice(state.reviewIndex,1);state.reviewIndex=Math.min(state.reviewIndex,reviews.length-1);state.reviewEdit=false;render()}
function renderSettings(){return `<section class="panel"><div class="panel-head"><div><h3 class="panel-title">${t('tabSettings')}</h3><p class="panel-sub">ตั้งค่าประตูความมั่นใจและกฎการส่งเข้า Express</p></div></div><div class="panel-body settings-grid"><div class="setting-card"><h3>เกณฑ์ส่งอัตโนมัติ</h3><p>สูงกว่าค่านี้ส่งอัตโนมัติ ต่ำกว่านี้เข้ารอตรวจสอบ</p><div class="range-wrap"><div class="range-row"><span>保守</span><input type="range" min="55" max="95" value="${state.threshold}" oninput="state.threshold=this.value;render()"/><span>激进</span></div><div class="estimate"><span>当前阈值</span><b>${state.threshold}%</b></div><div class="estimate"><span>预计自动推送</span><b>${Math.max(42,Math.min(91,Math.round(118-state.threshold/1.4)))}%</b></div></div></div><div class="setting-card"><h3>默认科目与付款规则</h3><p>供应商规则优先；缺失时使用兜底采购科目。</p><div class="option-list"><div class="option"><span>兜底采购科目</span><b>ซื้อสินค้า / 5010</b></div><div class="option"><span>已付 → 现购 HP</span><button class="toggle on"><span></span></button></div><div class="option"><span>未付 → 赊购 RR</span><button class="toggle on"><span></span></button></div></div></div><div class="setting-card"><h3>推送时间</h3><p>可实时推送，也可按固定时间批量推。</p><div class="option-list"><div class="option"><span>实时推送</span><button class="toggle on"><span></span></button></div><div class="option"><span>定时批量</span><b>18:00</b></div></div></div><div class="setting-card"><h3>通知</h3><p>Agent 离线或推送失败时通知会计。</p><div class="option-list"><div class="option"><span>站内提醒</span><button class="toggle on"><span></span></button></div><div class="option"><span>LINE</span><button class="toggle on"><span></span></button></div><div class="option"><span>Email</span><button class="toggle"><span></span></button></div></div></div></div></section>`}
function openDrawer(id){const item=queue.find(x=>x.id===id)||reviews.find(x=>x.id===id)||queue[0];const status=item.status||'pending';document.getElementById('drawerBackdrop').classList.add('show');const d=document.getElementById('drawer');d.classList.add('show');d.innerHTML=`<div class="drawer-head"><div><b>${item.id} · ${item.vendor}</b><div class="panel-sub">Express preview / 分录预览</div></div><button class="btn" onclick="closeDrawer()">${t('close')}</button></div><div class="drawer-body"><div class="drawer-grid"><div class="invoice-paper" style="height:360px"><div class="paper-line short"></div><div class="paper-line mid"></div><div class="paper-line"></div><div class="paper-line"></div><div style="height:70px"></div><div class="paper-total">TOTAL ${item.amount}</div></div><div class="field-list" style="padding:0">${reviewFields({vendor:item.vendor,amount:item.amount,field:''}).join('')}</div></div><div class="journal"><div class="journal-line"><b class="dr">Dr</b><span>采购/存货 · ซื้อสินค้า</span><b>375,347.20</b></div><div class="journal-line"><b class="dr">Dr</b><span>进项税 · ภาษีซื้อ</span><b>26,274.30</b></div><div class="journal-line"><b class="cr">Cr</b><span>应付账款 · เจ้าหนี้</span><b>401,621.50</b></div><div class="journal-line total"><span></span><span>借贷平衡 / Balanced</span><b>401,621.50</b></div></div><div class="panel"><div class="panel-head"><div><h3 class="panel-title">สถานะเวลา</h3><p class="panel-sub">只有 Express 确认写入成功后才显示已推送</p></div>${statusBadge(status)}</div><div class="panel-body timeline">${timeline(status,item)}</div></div><div style="display:flex;gap:10px;justify-content:flex-end"><button class="btn">转人工</button><button class="btn">重推</button><button class="btn brand">打开 Express 指引</button></div></div>`}
function timeline(status,item){const base=[['识别','10:31','done'],['已批准','10:38','done'],['待推送','10:42',status==='pending'?'done':'done'],['推送中',status==='pushing'?'进行中':'10:47',status==='pushing'?'done':(status==='done'||status==='failed'?'done':'')],['已推送 / 失败',status==='done'?(item.express||'RR240620-015'):(status==='failed'?(item.err||'错误原因'):'等待中'),status==='done'?'done':(status==='failed'?'fail':'')]];return base.map(x=>`<div class="time-step ${x[2]}"><div class="time-dot"></div><div><b>${x[0]}</b><small>${x[1]}</small></div></div>`).join('')}
function closeDrawer(){document.getElementById('drawerBackdrop').classList.remove('show');document.getElementById('drawer').classList.remove('show')}
document.getElementById('drawerBackdrop').onclick=closeDrawer;
function openWizard(){state.wizardOpen=true;state.wizardStep=1;state.wizard={erp:'Express',agent:false,company:'9.ข้อมูลทดสอบ (DATAT)',method:'rpa',mappingOpen:false,tested:false,sample:false,auto:false};renderWizard()}

function wizardTitle(i){return ['','เลือก ERP','ติดตั้ง Agent','เลือก账套','录入方式','字段映射','测试','完成'][i]}
function wizardContent(){const s=state.wizardStep;if(s===1)return `<h2>เลือก ERP ที่ต้องการเชื่อมต่อ</h2><p>Express เป็นรุ่นหลักในรอบนี้ ระบบอื่นแสดงไว้เพื่อวางแผน roadmap</p><div class="choice-grid">${['Express','FlowAccount','PEAK','Xero'].map((x,i)=>`<div class="choice-card ${state.wizard.erp===x?'selected':''} ${i>0?'disabled':''}" onclick="${i===0?`state.wizard.erp='${x}';renderWizard()`:'toast(\'ยังไม่เปิดใช้งาน\')'}"><h3>${x}</h3><p>${i===0?'Express เป็น local software ต้องติดตั้ง小助手บนเครื่องที่เปิด Express ได้':'เร็ว ๆ นี้'}</p></div>`).join('')}</div>`;
if(s===2)return `<h2>ติดตั้ง小助手บนเครื่อง Express</h2><p>下载 → 安装 → 粘贴连接密钥。装完页面会自动检测，不用刷新。</p><div class="agent-install"><div class="install-box"><h3>Windows Agent</h3><p>ติดตั้งบนเครื่องที่เปิด Express ได้</p><button class="btn brand" onclick="startAgentWait()">下载 Windows 安装包</button><div class="checklist" style="margin-top:14px"><div class="check"><span>1. 下载</span><b>MSI</b></div><div class="check"><span>2. 安装</span><b>ACC-PC01</b></div><div class="check"><span>3. 粘贴密钥</span><b>Token</b></div></div></div><div class="install-box"><h3>连接密钥</h3><p>请勿外传。可随时重新生成。</p><div class="token"><span>PX-EXP-9DATAT-84F2-KL7Q</span><button class="chip" onclick="toast('คัดลอกแล้ว')">复制</button></div><div class="wait-box">${state.wizard.agent?`<span class="status green"><i></i>已检测到小助手 ACC-PC01</span><p class="panel-sub" style="margin-top:8px">กำลังเข้าสู่ขั้นตอนถัดไป...</p>`:`<span class="spinner"></span> 正在等待小助手回连…`}</div></div></div>`;
if(s===3)return `<h2>เลือก账套 / บริษัท Express</h2><p>Agent อ่านรายชื่อบริษัทจาก Express แล้ว เลือก目标账套สำหรับ推送。</p><div class="company-list">${['58ASIA-SPORT (PDATAT)','9.ข้อมูลทดสอบ (DATAT)','Z.ข้อมูลเปล่า (DATAZ)'].map(x=>`<div class="company ${state.wizard.company===x?'selected':''}" onclick="state.wizard.company='${x}';renderWizard()"><div><b>${x}</b><small style="display:block;color:var(--muted)">${x.includes('ทดสอบ')?'测试账套，适合试推':'真实账套，写入真实账目'}</small></div><span>${state.wizard.company===x?'✓':''}</span></div>`).join('')}</div>${!state.wizard.company.includes('ทดสอบ')?`<div class="mini-warning">这是真实账套，推送会写入真实账目，建议先用测试账套验证。</div>`:''}`;
if(s===4)return `<h2>เลือกวิธี录入 Express</h2><p>推荐先用模拟录入，稳定后再考虑 DBF 高级模式。</p><div class="choice-grid"><div class="choice-card ${state.wizard.method==='rpa'?'selected':''}" onclick="state.wizard.method='rpa';renderWizard()"><span class="tag green">แนะนำ / 推荐</span><h3>A · 模拟录入 RPA</h3><p>像人一样在 Express 里录入，由 Express 自己完成记账，最安全。需要电脑保持开启。</p></div><div class="choice-card ${state.wizard.method==='dbf'?'selected':''}" onclick="openRiskModal()"><span class="tag amber">ขั้นสูง / 高级</span><h3>B · 直写数据 DBF</h3><p>直接写入数据文件，更快，但有数据风险。必须确认风险后才能继续。</p></div></div>`;
if(s===5)return `<h2>字段映射</h2><p>默认自动匹配，多数用户不用展开；高级用户可微调。</p><div class="check green" style="margin-bottom:14px"><span>已自动匹配字段</span><b>✓</b></div><button class="btn" onclick="state.wizard.mappingOpen=!state.wizard.mappingOpen;renderWizard()">${state.wizard.mappingOpen?'收起':'展开'}高级映射</button>${state.wizard.mappingOpen?`<div class="mapping" style="margin-top:14px">${[['卖家','Supplier Code'],['税号','Tax ID'],['发票号','Doc No.'],['日期','Doc Date'],['税前金额','Before VAT'],['VAT','Input VAT'],['含税合计','Total'],['品项','Item Memo']].map(a=>`<div class="map-row"><span>${a[0]}</span><span>→</span><select><option>${a[1]}</option><option>Memo</option><option>Amount</option></select></div>`).join('')}</div><div class="mini-warning">默认规则：已付→现购 HP / 未付→赊购 RR；新供应商首次推送可自动建档。</div>`:''}`;
if(s===6)return `<h2>测试连接 / 试推一张</h2><p>先跑检查清单，再可把样例发票试推到测试账套。</p><div class="checklist"><div class="check"><span>Agent 在线</span><b class="${state.wizard.tested?'green':''}">${state.wizard.tested?'✓':'待测试'}</b></div><div class="check"><span>账套可写</span><b class="${state.wizard.tested?'green':''}">${state.wizard.tested?'✓':'待测试'}</b></div><div class="check"><span>字段映射完整</span><b class="${state.wizard.tested?'green':''}">${state.wizard.tested?'✓':'待测试'}</b></div></div><div style="display:flex;gap:10px;margin-top:14px"><button class="btn brand" onclick="state.wizard.tested=true;toast('测试通过');renderWizard()">测试连接</button><button class="btn" onclick="state.wizard.sample=true;state.wizard.tested=true;renderWizard()">试推样例</button></div>${state.wizard.sample?`<div style="margin-top:16px">${journalPreview()}</div>`:''}`;
if(s===7)return `<h2>เชื่อมต่อสำเร็จ</h2><p>默认不自动开启，让用户主动开，状态诚实。</p><div class="empty" style="min-height:250px"><div class="empty-icon">✓</div><h3>Express พร้อมใช้งาน</h3><p>可以回到推送中心查看队列，也可以开启自动推送。</p><div class="option" style="width:min(420px,100%)"><span>เปิดส่งอัตโนมัติ</span><button class="toggle ${state.wizard.auto?'on':''}" onclick="state.wizard.auto=!state.wizard.auto;renderWizard()"><span></span></button></div></div>`;
}
function journalPreview(){return `<div class="journal"><div class="journal-line"><b class="dr">Dr</b><span>采购/存货</span><b>375,347.20</b></div><div class="journal-line"><b class="dr">Dr</b><span>进项税 ภาษีซื้อ</span><b>26,274.30</b></div><div class="journal-line"><b class="cr">Cr</b><span>应付账款 เจ้าหนี้</span><b>401,621.50</b></div><div class="journal-line total"><span></span><span>发票号 RR581231-002 · 税期 12/2558 · 供应商 ก005</span><b>Balanced</b></div></div>`}
function startAgentWait(){toast('เริ่มรอ Agent...');setTimeout(()=>{state.wizard.agent=true;renderWizard();toast('已检测到小助手 ACC-PC01');setTimeout(()=>{if(state.wizardOpen&&state.wizardStep===2){state.wizardStep=3;renderWizard()}},900)},1300)}
function wizardCanNext(){const s=state.wizardStep;if(s===2)return state.wizard.agent;if(s===3)return !!state.wizard.company;if(s===4)return state.wizard.method==='rpa'||(state.wizard.method==='dbf'&&state.dbfAck);if(s===6)return state.wizard.tested;return true}
function wizardNext(){if(!wizardCanNext())return;if(state.wizardStep===7){closeWizard();state.tab='center';render();toast('连接已创建，进入推送中心');return}state.wizardStep++;renderWizard()}function wizardPrev(){if(state.wizardStep>1){state.wizardStep--;renderWizard()}}
function openRiskModal(){document.getElementById('riskModal').classList.add('show');state.dbfAck=false;renderRiskModal()}
function renderRiskModal(){const m=document.getElementById('riskModal');if(!m.classList.contains('show')){m.innerHTML='';return}m.innerHTML=`<div class="modal"><h2>直写数据模式 · 请确认风险</h2><p>DBF 模式会直接写入 Express 数据文件，适合高级用户和测试完成后的场景。</p><div class="risk-list"><div class="risk"><b>1</b><span>直接写入财务数据文件，若中断/异常可能导致账目不一致。</span></div><div class="risk"><b>2</b><span>系统会在每次写入前自动备份账套，并校验借贷平衡。</span></div><div class="risk"><b>3</b><span>失败自动回滚；仍强烈建议先在测试账套验证。</span></div></div><label class="checkline"><input type="checkbox" onchange="state.dbfAck=this.checked;renderRiskModal()" ${state.dbfAck?'checked':''}/><span>我已了解并接受风险</span></label><div class="modal-actions"><button class="btn" onclick="closeRiskUseRpa()">改用模拟录入(推荐)</button><button class="btn brand" ${state.dbfAck?'':'disabled'} onclick="confirmDbf()">确认使用直写</button></div></div>`}
function closeRiskUseRpa(){document.getElementById('riskModal').classList.remove('show');state.wizard.method='rpa';renderWizard();renderRiskModal()}function confirmDbf(){document.getElementById('riskModal').classList.remove('show');state.wizard.method='dbf';state.dbfAck=true;renderWizard();renderRiskModal();toast('已选择 DBF 直写模式')}
function toast(msg){const host=document.getElementById('toastHost');const el=document.createElement('div');el.className='toast';el.textContent=msg;host.appendChild(el);setTimeout(()=>{el.style.opacity='0';el.style.transform='translateY(6px)';setTimeout(()=>el.remove(),220)},2600)}
render();
</script>
</body>
</html>
