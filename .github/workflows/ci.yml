name: CI

# 阶段 3-4 + REFACTOR-A1.2 · 最小 CI 自动化保险
# 防"v0.20 db pool 5 重演" · 每次 push / PR 必须五关都过:
#   1) import 静态检查
#   2) home.js i18n 4 语完整性(zh/en/th/ja key 集合一致)
#   3) unit tests 全绿
#   4) Vite build 跑通(REFACTOR-A1.2 加 · npm run build · 防本地 build 漏跑)
#   5) Playwright E2E smoke(pearnly.com 着陆页 · 顶栏 + 4 语切换 + 无 console error)
# 不依赖生产 secret · 不调后端业务(integ contract tests 全部 stub · e2e 只 GET 公开页)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

# 同一 ref 上有新 push 时取消旧 run · 省 CI 配额
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # REFACTOR-A5 · 代码规范守门(与 test 并行 · 独立信号)
  #   black --check  : Python 格式化唯一权威
  #   ruff check     : Python pyflakes 真 bug(未定义名/未用导入/format 参数等)
  #   prettier --check: 前端代码格式(巨石 home.* 经 .prettierignore 豁免 · 阶段 C 拆解再纳入)
  #   eslint         : 前端模块真 bug(0 error 放行 · warning 仅提示)
  lint:
    name: lint (black + ruff + prettier + eslint)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install lint tools (REFACTOR-A5/A6 · pinned black/ruff/bandit/pip-audit)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: black --check (Python 格式化)
        run: black --check .

      - name: ruff check (Python lint)
        run: ruff check .

      - name: bandit (REFACTOR-A6 · Python 静态安全 · HIGH 拦门)
        run: bandit -r . -c pyproject.toml --severity-level high -q

      - name: pip-audit (REFACTOR-A6 · 依赖 CVE · 锁文件已全 pin)
        run: pip-audit -r requirements.lock.txt --no-deps --progress-spinner off

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node deps (npm ci)
        run: npm ci

      - name: prettier --check (前端格式 · 巨石豁免)
        run: npm run format:check

      - name: eslint (前端模块 lint)
        run: npm run lint

      - name: npm audit (REFACTOR-A6 · 前端依赖 CVE · high 拦门)
        run: npm audit --audit-level=high

  # REFACTOR-WC-P1 · 防屎山闸(铁律 #27 · 窗口 C · 2026-05-28)
  #   #1 check_file_size.py : 任何监控代码文件 > 500 行 → fail(历史巨石短期豁免在脚本里)
  #   #2 check_line_ratchet.py: 任何监控文件净增长 > 0 → fail(透明豁免:commit 加 RATCHET-EXEMPT)
  # 当前模式 = warning(continue-on-error: true · 红但不挡 push) ·
  # 等 Loop 1 把 app.py / home.js 等巨石拆到目标 < 500 / < 200 ·
  # Zihao 拍板"切硬门" → 删 continue-on-error 进 fail 模式 · 整顿期就不会再糊回去。
  lint-size:
    name: lint-size (REFACTOR-WC-P1 · anti-bigfile · WARNING mode)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # ⚠️ warning 模式 · 红但不挡 push · Loop 1 拆完巨石后改 false(fail 模式)
    continue-on-error: true

    steps:
      - name: Checkout (full history · 棘轮需要 HEAD~1)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 全历史 · 否则 HEAD~1 在 shallow clone 里不存在

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # 两个脚本只用标准库 · 不装任何依赖(故意 · 零依赖 · 任何环境跑得动)

      - name: 防屎山闸 #1 · 文件行数 ≤ 500(铁律 #27.1)
        run: python scripts/check_file_size.py

      - name: 防屎山闸 #2 · 棘轮 · 监控文件只许减不许增(铁律 #27.2)
        # PR 用 origin/master..HEAD 看全 diff;push 用默认 HEAD~1..HEAD
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python scripts/check_line_ratchet.py --base origin/${{ github.base_ref }} --head HEAD
          else
            python scripts/check_line_ratchet.py
          fi

  # REFACTOR-WC · UI 一致性闸(审计发现 #2:check_ui_consistency 没接 CI · 1787 违规无人棘轮)
  #   棘轮:违规总数 > BASELINE_TOTAL(脚本内 · 现 1787)→ 非零退出。
  #   当前 warning 模式(continue-on-error: true · 红但不挡 push)· 等窗口 B 把 B1/B2 降下来 ·
  #   手动把 BASELINE_TOTAL 棘轮调小 → 谁让 UI 不一致反弹超基线,CI 当场报红。
  lint-ui:
    name: lint-ui (REFACTOR-WC · UI 一致性棘轮 · WARNING mode)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # ⚠️ warning 模式 · 红但不挡 push · 窗口 B 降违规 + 棘轮收紧后改 false(fail 模式)
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # 零依赖(只用标准库)

      - name: UI 一致性棘轮 · 违规不许反弹超基线(审计 #2)
        run: python scripts/check_ui_consistency.py

  # REFACTOR-WC · 新债 diff 闸(封死铁律 #5/#17 · 审计发现「纸面规矩没机械执行」)
  #   #5  db.py/services/** 不许新增 def ensure_*  (运行期建表反模式 · schema 只走 alembic)
  #   #17 app.py 不许新增 @app.<verb> 路由         (路由必落 *_routes.py · 防巨石回潮)
  # 只看本次 diff 的【新增行】· 命中即 fail · commit 加 NEW-DEBT-EXEMPT 透明豁免。
  # 与 lint-size 不同:此闸 fail 模式(当前 HEAD 干净 · 不会误红存量)· 需全历史拿 HEAD~1。
  lint-debt:
    name: lint-debt (REFACTOR-WC · new-debt diff gate · FAIL mode)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout (full history · diff 需要 HEAD~1)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 全历史 · 否则 HEAD~1 / origin/master 在 shallow clone 里不存在

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # 零依赖(只用标准库)· 任何环境跑得动

      - name: 新债 diff 闸 · 禁新增 ensure_*/巨石路由(铁律 #5/#17)
        # PR 用 origin/master..HEAD 看全 diff;push 用默认 HEAD~1..HEAD
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python scripts/check_new_debt.py --base origin/${{ github.base_ref }} --head HEAD
          else
            python scripts/check_new_debt.py
          fi

  # REFACTOR-WC · 新路由契约软闸(审计 #4 · 铁律 #27.3/#28问3「新功能必带测试」)
  #   只看本次 diff 【新增】的 *_routes.py · 缺配套 tests/unit/test_*_contract.py → 非零退出。
  #   软闸:warning 模式(continue-on-error)· 只盯新增不误伤存量 · commit 加 ROUTES-CONTRACT-EXEMPT 豁免。
  lint-routes:
    name: lint-routes (REFACTOR-WC · new-route needs contract test · WARNING mode)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # ⚠️ 软闸 · 红但不挡 push · 团队稳定遵守后可改 false(fail 模式)
    continue-on-error: true

    steps:
      - name: Checkout (full history · diff 需要 HEAD~1)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 全历史 · 否则 HEAD~1 / origin/master 在 shallow clone 里不存在

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # 零依赖(只用标准库)

      - name: 新路由契约软闸 · 新增 *_routes.py 必带契约测试(审计 #4)
        # PR 用 origin/master..HEAD 看全 diff;push 用默认 HEAD~1..HEAD
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python scripts/check_new_routes_contract.py --base origin/${{ github.base_ref }} --head HEAD
          else
            python scripts/check_new_routes_contract.py
          fi

  test:
    name: import + i18n + unit + vite-build + e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.lock.txt

      - name: Install dependencies (REFACTOR-A7 · 装 pip-compile 锁好的版本)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock.txt
          pip install coverage==7.14.0  # REFACTOR-A8 · 覆盖率工具(dev · 不进 prod lock)

      - name: Static import check
        run: python scripts/check_imports.py --quiet

      - name: i18n completeness check (home.js · zh/en/th/ja)
        run: python scripts/check_i18n.py --strict --quiet

      - name: Run unit tests (under coverage · REFACTOR-A8)
        run: coverage run -m unittest discover -s tests/unit -p "test_*.py"

      - name: Coverage report + ratchet (REFACTOR-A8 · fail_under 只升不降 · WC 显式 CLI 闸)
        run: |
          # REFACTOR-WC · 显式 --fail-under 防 pyproject 配置被删/改后覆盖率闸悄悄失效
          # (审计发现:纸面规矩要机械执行 · CLI 标志即便 [tool.coverage.report] 被动也照样拦门)
          # 棘轮 21 → 40(本地实测 46.6% · 留 6.6pt 余量 · 只升不降)
          coverage report --fail-under=40
          coverage xml

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node deps (npm ci · 严格按 lockfile)
        run: npm ci

      - name: Vite build (REFACTOR-A1.2 · 防本地 build 产物没提交)
        run: |
          npm run build
          # static/dist/main.js 是 A1.1 起的 Vite 产物 · 本地 build 后必须 commit
          # CI 这步重 build 一次 · 跑通 = 配置无脏 · 失败 = vite.config.mjs / src/main.js 有问题
          test -f static/dist/main.js || { echo "::error::vite build did not produce static/dist/main.js"; exit 1; }

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Install Chromium system deps
        run: npx playwright install-deps chromium

      - name: E2E smoke (Playwright · pearnly.com)
        run: npx playwright test
        env:
          PEARNLY_E2E_BASE_URL: https://pearnly.com

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
